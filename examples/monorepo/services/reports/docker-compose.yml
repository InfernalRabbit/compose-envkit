# ============================================
# reports subproject — base compose, nested under services/ (one level deeper
# than web/ + api/). This mirrors the legacy monorepo's services/<svc>/ layout.
#
# Reached from the root via the `include:` graph in the root docker-compose.yml.
# COMPOSE_DEPTH is accepted-but-ignored; the include graph, not depth-bounded
# glob discovery, is what makes cenvkit aware of this subproject.
#
# REPORTS_PORT lives ONLY in this subproject's env_file (.reports.env) —
# runtime-only (container env). ${REPORTS_PORT} falls back to :-0 at
# compose-time interpolation. `cenvkit env-debug --trace --var REPORTS_PORT`
# shows the gap. Add REPORTS_PORT to the Layer-1 chain to feed interpolation.
# ============================================

services:
  reports:
    image: busybox
    command: ["sh", "-c", "echo reports on $${REPORTS_PORT}; sleep 3600"]
    env_file:
      - path: ./.reports.env
        required: false
    ports:
      - "${REPORTS_PORT:-0}:80"
    environment:
      REPORTS_PORT: "${REPORTS_PORT:-0}"
