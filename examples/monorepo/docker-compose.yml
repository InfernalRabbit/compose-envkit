# ============================================
# Root compose — the UNIFIED stack, run from the repo root.
#
# It `include:`s each subproject's own compose file and adds the cross-cutting
# bits that only make sense for the whole stack: a shared network and any
# cross-service startup ordering. Each subproject still runs standalone from its
# own dir (see web/ and api/); this file just composes them into one stack.
#
# Requires Docker Compose v2.24+ (for `env_file: required:` and `include:`).
#
# WHY the kit matters here: the included subproject compose files reference
# ${WEB_PORT} / ${API_PORT}, but those vars live ONLY in the subprojects' own
# service env_file: (web/.web.env, api/.api.env). Those env_file:s are
# runtime-only — they do NOT feed ${VAR} interpolation. So ${WEB_PORT} and
# ${API_PORT} fall back to :-0 at the run. Use `cenvkit env-debug --trace --var
# WEB_PORT` to see the gap; promote a port to the Layer-1 chain (.env) if you
# need it to interpolate at compose time.
# ============================================

include:
  - path: ./web/docker-compose.yml
  - path: ./api/docker-compose.yml
  - path: ./services/reports/docker-compose.yml   # nested one level deeper (services/<svc>/)

services:
  # Cross-service wiring for services defined in the included subproject files.
  # Attach them to the shared network and order api after web as an example of
  # root-only orchestration (subprojects don't know about each other).
  web:
    networks: [shared]
    environment:
      # Demo of the root IS_DEV tier value reaching a service (true in dev,
      # false in prod — selected by COMPOSE_ENV via .dev.env / .prod.env).
      IS_DEV: "${IS_DEV:-unset}"

  api:
    networks: [shared]
    depends_on:
      web: { condition: service_started }

  # A deeper subproject (services/reports/) — nested one extra level under
  # services/. Reached via the include: graph from the root. Joins the shared network.
  reports:
    networks: [shared]

  # Optional helper — OFF by default, enabled with COMPOSE_PROFILES=tools.
  # Demonstrates compose-envkit's profiles passthrough: the ./docker shim
  # forwards COMPOSE_PROFILES to `docker compose` unchanged (no kit state).
  tools:
    image: busybox
    profiles: [tools]
    command: ["sh", "-c", "echo tools; sleep 3600"]
    networks: [shared]

networks:
  shared:
    driver: bridge
