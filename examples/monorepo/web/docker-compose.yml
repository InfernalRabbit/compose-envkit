# ============================================
# web subproject — base compose.
#
# Runs two ways:
#   Standalone:  from this dir (web/) via its own ./docker (see web/Makefile).
#   Unified:     pulled into the root stack by the root docker-compose.yml
#                `include:`.
#
# WEB_PORT is declared ONLY in this subproject's service env_file: (.web.env).
# The `${WEB_PORT:-0}` published port resolves to the real value (18080) because
# the kit folds .web.env into COMPOSE_ENV_FILES (Layer-2) — whether you run from
# here OR from the root (cross-subproject Layer-2 via the include).
# ============================================

services:
  web:
    image: busybox
    command: ["sh", "-c", "echo web on $${WEB_PORT}; sleep 3600"]
    env_file:
      - path: ./.web.env
        required: false
    ports:
      - "${WEB_PORT:-0}:80"
    environment:
      WEB_PORT: "${WEB_PORT:-0}"
