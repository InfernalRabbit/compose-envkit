name: Release

# Build + publish cross-OS binaries (linux/darwin/windows × amd64/arm64) when a
# vX.Y.Z tag is pushed. The .goreleaser.yaml build matrix is validated on every
# CI run (`goreleaser check`); this workflow runs the ACTUAL release on a tag.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release + upload the archives/checksums

jobs:
  goreleaser:
    name: goreleaser release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # goreleaser needs full history + tags for the changelog
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
